name: FormAssist CI/CD

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ 1. Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v3

      # ✅ 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      # ✅ 3. Install Frontend Dependencies
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      # ✅ 4. Build Frontend
      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      # ✅ 5. Install Backend Dependencies
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      # ✅ 6. Backend Health Check
      - name: Backend Check
        working-directory: ./backend
        run: node -e "console.log('✅ Backend OK')"

      # ✅ 7. Setup Python (IMPORTANT FIX)
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # ✅ 8. Install AI Module Dependencies
      - name: Install AI Dependencies
        working-directory: ./ai-module
        run: pip install -r requirements.txt

      # ✅ 9. AI Module Check
      - name: AI Module Check
        working-directory: ./ai-module
        run: python -c "print('✅ AI Module OK')"

      # ✅ 10. Success Message
      - name: Success Message
        run: echo "🚀 CI/CD Pipeline Successful"
